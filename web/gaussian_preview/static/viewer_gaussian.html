<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeomPack Gaussian Splat Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #viewerContainer {
            position: relative;
            flex: 1;
            min-height: 0;
            background: #111;
        }

        canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #ratioOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows canvas orbit controls to work across the whole screen */
            overflow: hidden;
            display: none;
            z-index: 10;
        }

        #focusArea {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #ff3b30; /* Crisp red frame border */
            box-shadow: 0 0 0 10000px rgba(0, 0, 0, 0.5); /* opacity dark overlay outside the box */
            box-sizing: border-box;
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ff6b6b;
            padding: 20px;
            max-width: 80%;
        }

        .error.hidden {
            display: none;
        }

        #controlsBar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #252525;
            padding: 10px 12px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        .control-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        #controlsBar button {
            background: #444;
            border: none;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        #controlsBar button:hover {
            background: #555;
        }

        .scale-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scale-control span {
            color: #888;
            font-size: 11px;
        }

        .scale-control input[type="range"] {
            width: 120px;
            background: #333;
            accent-color: #6cc;
            cursor: pointer;
        }

        .scale-control input[type="number"],
        .scale-control input[type="text"],
        .scale-control select {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 3px;
            outline: none;
        }

        .scale-control input[type="number"] {
            width: 60px;
            text-align: center;
        }

        .scale-control select {
            cursor: pointer;
        }

        /* Hide standard HTML5 spin buttons for a cleaner layout */
        .scale-control input[type="number"]::-webkit-outer-spin-button,
        .scale-control input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .scale-control input[type="number"] {
            -moz-appearance: textfield;
        }

        .info-panel {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 4px;
            color: #aaa;
            font-size: 11px;
            font-family: monospace;
            z-index: 50;
        }

        .info-panel.hidden {
            display: none;
        }

        /* Modal Overlay & Window Styles */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-window {
            background: #252525;
            border: 1px solid #444;
            border-radius: 6px;
            width: 320px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            color: #fff;
        }

        .modal-title {
            font-size: 14px;
            font-weight: 600;
            color: #6cc;
            margin-bottom: 12px;
            text-align: left;
        }

        .shortcut-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-bottom: 16px;
        }

        .shortcut-table td {
            padding: 4px 0;
            vertical-align: top;
            text-align: left;
        }

        .shortcut-table td.key-col {
            color: #fff;
            font-weight: 600;
            width: 45%;
        }

        .shortcut-table td.desc-col {
            color: #aaa;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
        }

        .modal-close-btn {
            background: #444;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        .modal-close-btn:hover {
            background: #555;
        }
    </style>
</head>

<body>
    <div id="viewerContainer">
        <canvas id="canvas"></canvas>

        <!-- Dynamic Safe Area Framing Overlay -->
        <div id="ratioOverlay">
            <div id="focusArea"></div>
        </div>

        <div id="error" class="error hidden"></div>

        <div id="infoPanel" class="info-panel hidden">
            <div id="infoContent"></div>
        </div>

        <!-- Info Modal Popup -->
        <div id="infoModal" class="modal-overlay">
            <div class="modal-window">
                <div class="modal-title">Keyboard Shortcuts</div>
                <table class="shortcut-table">
                    <tr>
                        <td class="key-col">WASD / Arrows</td>
                        <td class="desc-col">Move / Pan</td>
                    </tr>
                    <tr>
                        <td class="key-col">Q / E</td>
                        <td class="desc-col">Yaw (Left/Right)</td>
                    </tr>
                    <tr>
                        <td class="key-col">R / F</td>
                        <td class="desc-col">Pitch (Up/Down)</td>
                    </tr>
                    <tr>
                        <td class="key-col">Z / C</td>
                        <td class="desc-col">Roll</td>
                    </tr>
                    <tr>
                        <td class="key-col">Shift</td>
                        <td class="desc-col">Precision (0.1x)</td>
                    </tr>
                    <tr>
                        <td class="key-col">Left Click</td>
                        <td class="desc-col">Orbit</td>
                    </tr>
                    <tr>
                        <td class="key-col">Right Click</td>
                        <td class="desc-col">Pan</td>
                    </tr>
                    <tr>
                        <td class="key-col">Scroll</td>
                        <td class="desc-col">Zoom</td>
                    </tr>
                </table>
                <div class="modal-footer">
                    <button id="closeModal" class="modal-close-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div id="controlsBar">
        <!-- Row 1: Viewer Modifications -->
        <div class="control-row">
            <div class="scale-control">
                <span>Splat Scale:</span>
                <input type="range" id="gaussianScaleValue" min="0.1" max="3.0" step="0.05" value="1.0"
                    title="Gaussian scale multiplier">
                <input type="number" id="scaleInputNumber" min="0.01" max="100.0" step="0.01" value="1.00" title="Splat scale multiplier">
            </div>
            <div class="scale-control">
                <span>Camera Focal:</span>
                <input type="range" id="cameraFocalValue" min="100" max="3000" step="10" value="600"
                    title="Camera focal length in pixels">
                <input type="number" id="focalInputNumber" min="10" max="10000" step="1" value="600" title="Camera focal length in pixels">
            </div>
            <div class="scale-control">
                <span>Image Ratio:</span>
                <select id="imageRatio" title="Constraint image aspect ratio">
                    <option value="canvas">Canvas</option>
                    <option value="1:1">1:1</option>
                    <option value="3:2">3:2</option>
                    <option value="4:3">4:3</option>
                    <option value="16:9">16:9</option>
                    <option value="2:1">2:1</option>
                    <option value="2:39">2:39</option>
                    <option value="9:16">9:16</option>
                </select>
            </div>
            <button id="setCamera" title="Lock camera view parameters for rendering" style="background: #2563eb;">Set Camera</button>
            <button id="resetCamera" title="Reset camera view">Reset View</button>
            <button id="infoBtn" title="Show keyboard shortcuts">Info</button>
        </div>

        <!-- Row 2: Preset Engine -->
        <div class="control-row">
            <div class="scale-control">
                <span>Preset:</span>
                <select id="presetSelect" title="Select a saved preset">
                    <option value="">(No Preset)</option>
                </select>
            </div>
            <div class="scale-control">
                <span>Name:</span>
                <input type="text" id="presetName" placeholder="New Preset..." style="width: 110px;" title="Preset identity name">
            </div>
            <div class="scale-control" style="gap: 4px;">
                <input type="checkbox" id="presetCameraRestore" checked title="Keep camera position when applying preset" style="cursor: pointer; width: auto; margin: 0;">
                <span style="font-size: 11px;">Keep Cam Pos</span>
            </div>
            <button id="presetSave" title="Save current parameters to selection/new name">Save</button>
            <button id="presetDelete" title="Delete selected preset" style="background: #e02424;">Delete</button>
        </div>
    </div>

    <!-- Load bundled gsplat.js -->
    <script src="./gsplat-bundle.js"></script>

    <script type="module">
        // Use the globally exported GSPLAT
        const SPLAT = window.GSPLAT;

        // DOM elements
        const canvas = document.getElementById('canvas');
        const errorEl = document.getElementById('error');
        const infoPanel = document.getElementById('infoPanel');
        const infoContent = document.getElementById('infoContent');
        const viewerContainer = document.getElementById('viewerContainer');
        const ratioOverlay = document.getElementById('ratioOverlay');
        const focusArea = document.getElementById('focusArea');

        const scaleInput = document.getElementById('gaussianScaleValue');
        const scaleNumber = document.getElementById('scaleInputNumber');
        const focalInput = document.getElementById('cameraFocalValue');
        const focalNumber = document.getElementById('focalInputNumber');
        const ratioDropdown = document.getElementById('imageRatio');

        const presetSelect = document.getElementById('presetSelect');
        const presetName = document.getElementById('presetName');

        const infoBtn = document.getElementById('infoBtn');
        const infoModal = document.getElementById('infoModal');
        const closeModal = document.getElementById('closeModal');
        const setCameraBtn = document.getElementById('setCamera');

        // gsplat.js components
        let scene = null;
        let camera = null;
        let renderer = null;
        let controls = null;
        let animationId = null;
        let currentSplat = null;
        let fovReference = null;
        let viewportScaleCompensation = 1.0;
        let renderActiveUntil = 0;
        let lastRenderTime = 0;
        let currentMeshName = ""; // Track loaded mesh globally

        // Camera lock tracking configurations
        let isCameraLocked = false;
        let lockedCameraState = null;

        // Default focal length (pixel-space, sane default for 512px view)
        const DEFAULT_FOCAL_LENGTH = 600;
        const PREVIEW_FRAME_INTERVAL_MS = 1000 / 12;
        const IDLE_HEARTBEAT_MS = 5000;

        function invalidateRender(durationMs = 500) {
            renderActiveUntil = Math.max(renderActiveUntil, performance.now() + durationMs);
        }

        // Initialize the viewer
        function initViewer() {
            try {
                if (!SPLAT) {
                    throw new Error('GSPLAT library not loaded');
                }
                scene = new SPLAT.Scene();
                camera = new SPLAT.Camera();
                renderer = new SPLAT.WebGLRenderer(canvas);
                setOrbitControlsFromCamera();

                // Set default focal length
                camera.data.fx = DEFAULT_FOCAL_LENGTH;
                camera.data.fy = DEFAULT_FOCAL_LENGTH;

                // Handle resize
                const resize = () => {
                    resizeRendererToCanvas();
                    invalidateRender(800);
                };
                window.addEventListener('resize', resize);
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) invalidateRender(800);
                });
                resize();

                // Load any globally persistent presets
                populatePresetsDropdown();

                // Start render loop
                const frame = () => {
                    const now = performance.now();
                    const interval = PREVIEW_FRAME_INTERVAL_MS;
                    const active = now < renderActiveUntil;
                    const heartbeat = currentSplat && now - lastRenderTime > IDLE_HEARTBEAT_MS;

                    if ((active || heartbeat) && now - lastRenderTime >= interval) {
                        controls.update();
                        renderer.render(scene, camera);
                        lastRenderTime = now;
                    } else if (active) {
                        controls.update();
                    }
                    animationId = requestAnimationFrame(frame);
                };
                frame();
            } catch (err) {
                showError('Failed to initialize WebGL viewer: ' + err.message);
            }
        }
        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }

        // Store initial camera params for reset
        let initialCameraData = null;

        // Resolution lock state
        let isResolutionLocked = false;

        // Scale compensation: when focal length is scaled down for canvas size,
        // gaussian scales need to be multiplied by this factor to maintain correct screen-space size
        let gaussianScaleCompensation = 1.0;

        function getSceneMaxDim() {
            if (!currentSplat || !currentSplat.bounds) {
                return 1.0;
            }
            const size = currentSplat.bounds.size();
            return Math.max(size.x, size.y, size.z, 0.1);
        }

        // Get camera direction
        function getCameraForward() {
            const m = SPLAT.Matrix3.RotationFromQuaternion(camera.rotation).buffer;
            return new SPLAT.Vector3(m[2], m[5], m[8]).normalize();
        }

        function setOrbitControlsFromCamera() {
            if (!camera || !canvas) return;
            if (controls && controls.dispose) {
                controls.dispose();
            }
            controls = new SPLAT.OrbitControls(camera, canvas);
            controls.minZoom = 0.001;
            const pivotDistance = Math.min(0.05, Math.max(0.005, getSceneMaxDim() * 0.002));
            const forward = getCameraForward();
            const target = new SPLAT.Vector3(
                camera.position.x + forward.x * pivotDistance,
                camera.position.y + forward.y * pivotDistance,
                camera.position.z + forward.z * pivotDistance
            );
            controls.setCameraTarget(target);
            invalidateRender(800);
        }

        // Helper to locate active target on the controller
        function getControlsTarget() {
            if (!controls) return null;
            const candidates = ['target', '_target', 'cameraTarget', '_cameraTarget'];
            for (const key of candidates) {
                if (controls[key] && typeof controls[key].x === 'number') {
                    return controls[key];
                }
            }
            return null;
        }

        // Reinitializes OrbitControls at a specific position and focus target
        function setOrbitControlsFromSaved(camPos, targetPos) {
            if (!camera || !canvas) return;
            if (controls && controls.dispose) {
                controls.dispose();
            }
            controls = new SPLAT.OrbitControls(camera, canvas);
            controls.minZoom = 0.001;
            
            camera.position.x = camPos.x;
            camera.position.y = camPos.y;
            camera.position.z = camPos.z;
            
            controls.setCameraTarget(targetPos);
            invalidateRender(800);
        }

        function rememberCurrentFov(width, height) {
            if (!camera || !width || !height) return;
            fovReference = {
                width,
                height,
                fx: camera.data.fx || DEFAULT_FOCAL_LENGTH,
                fy: camera.data.fy || DEFAULT_FOCAL_LENGTH,
            };
        }

        function cloneFovReference() {
            return fovReference ? { ...fovReference } : null;
        }

        function applyFovReference(width, height) {
            if (!camera || !width || !height) return;
            if (!fovReference) {
                rememberCurrentFov(width, height);
                return;
            }

            // gsplat stores focal length in pixels. If the render buffer grows
            // but fx/fy stay fixed, FOV changes. Anchor to viewport height.
            const scale = height / Math.max(1, fovReference.height);
            camera.data.fx = fovReference.fx * scale;
            camera.data.fy = fovReference.fy * scale;
        }

        // Flags changes to the renderer to repack/upload coordinates
        function markCurrentSplatDirty() {
            if (!currentSplat || !currentSplat.data) return;
            currentSplat.data.changed = true;
            currentSplat.data.detached = false;

            const renderData = renderer?._renderData || renderer?.renderData;
            if (renderData) {
                if (renderData.markDirty) {
                    renderData.markDirty(currentSplat);
                }
                renderData.dataChanged = true;
            }
        }

        function applyViewportScaleCompensation(height) {
            if (!currentSplat || !currentSplat.data || !currentSplat.data.scales || !fovReference || !height) {
                return;
            }

            const desired = Math.min(1.0, fovReference.height / Math.max(1, height));
            const ratio = desired / viewportScaleCompensation;
            if (Math.abs(ratio - 1.0) < 0.0001) {
                return;
            }

            const scales = currentSplat.data.scales;
            for (let i = 0; i < scales.length; i++) {
                scales[i] *= ratio;
            }
            viewportScaleCompensation = desired;
            markCurrentSplatDirty();
            console.log('[GaussianViewer] Viewport scale compensation:', desired.toFixed(4));
        }

        function applyCoordinateBasisToSplat(splat, coordinateBasis) {
            if (!splat) return;
            const basis = (coordinateBasis || 'worldmirror').toLowerCase();
            splat.rotation = new SPLAT.Quaternion();
            console.log('[GaussianViewer] Loading splat without runtime basis rotation:', basis);
        }

        function getRatioValue(ratioStr) {
            if (ratioStr === 'canvas') return null;
            if (ratioStr === '1:1') return 1.0;
            if (ratioStr === '3:2') return 1.5;
            if (ratioStr === '4:3') return 4 / 3;
            if (ratioStr === '16:9') return 16 / 9;
            if (ratioStr === '2:1') return 2.0;
            if (ratioStr === '2:39') return 2.39;
            if (ratioStr === '9:16') return 9 / 16;
            return null;
        }

        function resizeRendererToCanvas() {
            if (!renderer) return;

            const containerWidth = Math.max(1, viewerContainer.clientWidth);
            const containerHeight = Math.max(1, viewerContainer.clientHeight);
            const selectedRatio = ratioDropdown.value;

            // Bypasses the resolution lock constraint if the user explicitly chooses framing overrides
            if (isResolutionLocked && selectedRatio === 'canvas') {
                ratioOverlay.style.display = 'none';
                return;
            }

            // Canvas always covers the entire frame. The guides display over it.
            canvas.style.width = `${containerWidth}px`;
            canvas.style.height = `${containerHeight}px`;

            renderer.setSize(containerWidth, containerHeight);

            // Compute dynamic mask guides
            if (selectedRatio === 'canvas') {
                ratioOverlay.style.display = 'none';
            } else {
                const targetRatio = getRatioValue(selectedRatio);
                if (targetRatio) {
                    let boxWidth = containerWidth;
                    let boxHeight = containerHeight;

                    if (containerWidth / containerHeight > targetRatio) {
                        boxHeight = containerHeight;
                        boxWidth = containerHeight * targetRatio;
                    } else {
                        boxWidth = containerWidth;
                        boxHeight = containerWidth / targetRatio;
                    }

                    focusArea.style.width = `${boxWidth}px`;
                    focusArea.style.height = `${boxHeight}px`;
                    ratioOverlay.style.display = 'block';
                } else {
                    ratioOverlay.style.display = 'none';
                }
            }

            applyFovReference(containerWidth, containerHeight);
            applyViewportScaleCompensation(containerHeight);
            invalidateRender(500);
        }

        // Set camera from extrinsics and intrinsics
        function setCameraFromExtrinsics(extrinsics, intrinsics, splat, apply = true) {
            if (!camera || !controls) return;
            console.log('[GaussianViewer] Calculating defaults from extrinsics/intrinsics (apply: ' + apply + ')');

            let camPosX = 0, camPosY = 0, camPosZ = 0;
            let forwardX = 0, forwardY = 0, forwardZ = 1;

            if (extrinsics && Array.isArray(extrinsics) && extrinsics.length === 4) {
                const R = [
                    [extrinsics[0][0], extrinsics[0][1], extrinsics[0][2]],
                    [extrinsics[1][0], extrinsics[1][1], extrinsics[1][2]],
                    [extrinsics[2][0], extrinsics[2][1], extrinsics[2][2]]
                ];
                const t = [extrinsics[0][3], extrinsics[1][3], extrinsics[2][3]];

                camPosX = -(R[0][0] * t[0] + R[1][0] * t[1] + R[2][0] * t[2]);
                camPosY = -(R[0][1] * t[0] + R[1][1] * t[1] + R[2][1] * t[2]);
                camPosZ = -(R[0][2] * t[0] + R[1][2] * t[1] + R[2][2] * t[2]);

                forwardX = R[2][0];
                forwardY = R[2][1];
                forwardZ = R[2][2];
                const forwardLen = Math.hypot(forwardX, forwardY, forwardZ) || 1.0;
                forwardX /= forwardLen;
                forwardY /= forwardLen;
                forwardZ /= forwardLen;
            }

            let targetZ = 2; // default
            if (intrinsics && Array.isArray(intrinsics) && intrinsics.length >= 2) {
                const fx = intrinsics[0][0];
                const fy = intrinsics[1][1];
                const cx = intrinsics[0][2];
                const cy = intrinsics[1][2];
                const imageWidth = cx * 2;
                const imageHeight = cy * 2;

                isResolutionLocked = true;

                const containerWidth = canvas.clientWidth || 512;
                const containerHeight = canvas.clientHeight || 512;

                renderer.setSize(imageWidth, imageHeight);

                canvas.style.width = '100%';
                canvas.style.height = '100%';

                if (apply) {
                    camera.data.fx = fx;
                    camera.data.fy = fy;
                    rememberCurrentFov(imageWidth, imageHeight);
                }

                let ratio = imageWidth / containerWidth;
                const DENSITY_BOOST = 10.0;
                gaussianScaleCompensation = ratio * DENSITY_BOOST;

                targetZ = Math.max(1, fy / imageHeight * 2);
            }

            let pivotDistance = 0.01;
            if (splat && splat.bounds) {
                const center = splat.bounds.center();
                const size = splat.bounds.size();
                const maxDim = Math.max(size.x, size.y, size.z);
                pivotDistance = Math.min(0.05, Math.max(0.005, maxDim * 0.002));
            }

            camPosY = -camPosY;
            forwardY = -forwardY;

            const camPos = new SPLAT.Vector3(camPosX, camPosY, camPosZ);
            const targetPos = new SPLAT.Vector3(
                camPosX + forwardX * pivotDistance,
                camPosY + forwardY * pivotDistance,
                camPosZ + forwardZ * pivotDistance
            );

            initialCameraData = {
                position: camPos,
                target: targetPos,
                fx: apply ? camera.data.fx : (intrinsics ? intrinsics[0][0] : DEFAULT_FOCAL_LENGTH),
                fy: apply ? camera.data.fy : (intrinsics ? intrinsics[1][1] : DEFAULT_FOCAL_LENGTH),
                fovReference: cloneFovReference(),
            };

            if (apply) {
                camera.position.x = camPosX;
                camera.position.y = camPosY;
                camera.position.z = camPosZ;

                const baselineFocal = Math.round(camera.data.fx);
                focalInput.value = baselineFocal;
                focalNumber.value = baselineFocal;

                if (controls.setCameraTarget) {
                    controls.setCameraTarget(targetPos);
                }
            }
        }

        // Auto-fit camera to scene bounds
        function autoFitCamera(apply = true) {
            if (!currentSplat || !currentSplat.bounds || !camera || !controls) return;

            const center = currentSplat.bounds.center();
            const size = currentSplat.bounds.size();
            const maxDim = Math.max(size.x, size.y, size.z);

            const fovX = 2 * Math.atan(canvas.clientWidth / (2 * camera.data.fx));
            const distance = (maxDim / 2) / Math.tan(fovX / 2) * 1.5;

            const targetPos = new SPLAT.Vector3(center.x, center.y, center.z);
            const computedPos = new SPLAT.Vector3(center.x, center.y, center.z - distance);

            initialCameraData = {
                position: computedPos.clone(),
                target: targetPos.clone(),
                fx: camera.data.fx,
                fy: camera.data.fy,
                fovReference: cloneFovReference(),
            };

            if (apply) {
                camera.position.x = computedPos.x;
                camera.position.y = computedPos.y;
                camera.position.z = computedPos.z;

                if (controls.setCameraTarget) {
                    controls.setCameraTarget(targetPos);
                }
            }
        }

        // Load a PLY or compact .splat file from ArrayBuffer data
        async function loadSplatFromData(arrayBuffer, filename, format, extrinsics, intrinsics, coordinateBasis, camera_parameters) {
            format = (format || 'ply').toLowerCase();
            console.log(`[GaussianViewer] 📥 loadSplatFromData started for ${filename} (${format})`);
            try {
                // Determine if this is the very first load of the viewer session [1]
                const isFirstLoad = (currentSplat === null);

                currentMeshName = filename || 'gaussian.ply';
                populatePresetsDropdown();

                if (isFirstLoad) {
                    isResolutionLocked = false;
                    camera.data.fx = DEFAULT_FOCAL_LENGTH;
                    camera.data.fy = DEFAULT_FOCAL_LENGTH;
                    fovReference = null;
                    viewportScaleCompensation = 1.0;
                    resizeRendererToCanvas();
                }

                if (scene.objects && scene.objects.length > 0) {
                    console.log(`[GaussianViewer] 🧹 Clearing ${scene.objects.length} existing objects...`);
                    while (scene.objects.length > 0) {
                        scene.removeObject(scene.objects[0]);
                    }
                }
                console.log('[GaussianViewer] ✨ Scene cleared');
                currentSplat = null;

                gaussianScaleCompensation = 1.0;
                if (intrinsics && Array.isArray(intrinsics) && intrinsics.length >= 2) {
                    const cx = intrinsics[0][2];
                    const imageWidth = cx * 2;
                    const containerWidth = canvas.clientWidth || 512;

                    let ratio = imageWidth / containerWidth;
                    const DENSITY_BOOST = 10.0;
                    gaussianScaleCompensation = ratio * DENSITY_BOOST;

                    console.log('[GaussianViewer] Pre-calculated scale compensation:', gaussianScaleCompensation.toFixed(2), 'x');
                }

                console.log('[GaussianViewer] Loading from data, size:', arrayBuffer.byteLength);

                if (format === 'splat') {
                    console.log('[GaussianViewer] ⏳ Calling SPLAT.Loader.LoadFromArrayBuffer...');
                    SPLAT.Loader.LoadFromArrayBuffer(arrayBuffer, scene);
                    console.log('[GaussianViewer] ✅ SPLAT.Loader.LoadFromArrayBuffer finished. Scene objects now:', scene.objects.length);
                } else {
                    const blob = new Blob([arrayBuffer], { type: 'application/octet-stream' });
                    const blobUrl = URL.createObjectURL(blob);
                    try {
                        console.log('[GaussianViewer] ⏳ Calling SPLAT.PLYLoader.LoadAsync...');
                        await SPLAT.PLYLoader.LoadAsync(blobUrl, scene);
                        console.log('[GaussianViewer] ✅ SPLAT.PLYLoader.LoadAsync finished. Scene objects now:', scene.objects.length);
                    } finally {
                        URL.revokeObjectURL(blobUrl);
                    }
                }

                if (scene.objects.length > 0) {
                    currentSplat = scene.objects[scene.objects.length - 1];
                    applyCoordinateBasisToSplat(currentSplat, coordinateBasis);
                }

                if (currentSplat && currentSplat.data && currentSplat.data.scales) {
                    const scales = currentSplat.data.scales;
                    currentSplat._originalScales = new Float32Array(scales);

                    if (gaussianScaleCompensation !== 1.0) {
                        for (let i = 0; i < scales.length; i++) {
                            scales[i] *= gaussianScaleCompensation;
                            currentSplat._originalScales[i] *= gaussianScaleCompensation;
                        }
                    }

                    markCurrentSplatDirty();
                }

                // Restore active user scale values on reloads
                if (!isFirstLoad) {
                    if (currentScale !== 1.0) {
                        applyScaleToData(currentScale);
                    }
                } else {
                    scaleInput.value = 1.0;
                    scaleNumber.value = '1.00';
                    currentScale = 1.0;
                    viewportScaleCompensation = 1.0;
                    applyViewportScaleCompensation(canvas.clientHeight || 1);
                }

                // Viewport loading & rendering configuration [1]
                if (isFirstLoad) {
                    // Check if we received parent-level locked camera graph state configurations
                    let incomingLockedState = null;
                    if (camera_parameters && camera_parameters !== "{}" && camera_parameters !== "") {
                        try {
                            const parsed = JSON.parse(camera_parameters);
                            if (parsed && parsed.position && parsed.target) {
                                incomingLockedState = {
                                    position: new SPLAT.Vector3(parsed.position.x, parsed.position.y, parsed.position.z),
                                    target: new SPLAT.Vector3(parsed.target.x, parsed.target.y, parsed.target.z),
                                    focal: parsed.focal || DEFAULT_FOCAL_LENGTH,
                                    ratio: parsed.aspect_ratio || 'canvas'
                                };
                            }
                        } catch (e) {
                            console.warn("[GaussianViewer] Failed to parse camera_parameters:", e);
                        }
                    }

                    if (incomingLockedState) {
                        console.log('[GaussianViewer] Restoring locked camera coordinates from graph parameters...');
                        isCameraLocked = true;
                        lockedCameraState = incomingLockedState;
                        setOrbitControlsFromSaved(lockedCameraState.position, lockedCameraState.target);
                        camera.data.fx = lockedCameraState.focal;
                        camera.data.fy = lockedCameraState.focal;
                        if (lockedCameraState.ratio) {
                            ratioDropdown.value = lockedCameraState.ratio;
                        }
                        resizeRendererToCanvas();

                        setCameraBtn.style.background = '#15803d'; // Lock permanently green
                        setCameraBtn.textContent = 'Camera Locked';
                    } else if (extrinsics || intrinsics) {
                        setCameraFromExtrinsics(extrinsics, intrinsics, currentSplat, true);
                        if (controls) controls.update();
                    } else {
                        autoFitCamera(true);
                    }
                } else {
                    // Subsequent load (hitting run/reload): Calculate initialCameraData silently for Reset View,
                    // but DO NOT apply any changes to the active camera position, rotation, or controls [1]
                    if (extrinsics || intrinsics) {
                        setCameraFromExtrinsics(extrinsics, intrinsics, currentSplat, false);
                    } else {
                        autoFitCamera(false);
                    }
                    console.log('[GaussianViewer] Viewport Lock Active: Bypassed camera resetting on reload.');
                }

                // Sync slider and field with active camera focal configurations
                const finalFocal = Math.round(camera.data.fx);
                focalInput.value = finalFocal;
                focalNumber.value = finalFocal;

                infoPanel.classList.remove('hidden');
                infoContent.innerHTML = `<span style="color:#6cc;">Gaussian Splat Loaded</span><br><span style="color:#888;">${filename}</span>`;

                window.parent.postMessage({
                    type: 'MESH_LOADED',
                    error: null,
                    timestamp: Date.now()
                }, '*');

                console.log('[GaussianViewer] Loaded successfully');
                invalidateRender(2500);

            } catch (err) {
                console.error('[GaussianViewer] Load error:', err);
                showError('Failed to load splat preview: ' + err.message);

                window.parent.postMessage({
                    type: 'MESH_ERROR',
                    error: err.message,
                    timestamp: Date.now()
                }, '*');
            }
        }

        // Reset camera to initial position
        function resetCamera() {
            if (camera && controls) {
                // Manually release the locks when reset view button clicked
                isCameraLocked = false;
                setCameraBtn.style.background = '#2563eb';
                setCameraBtn.textContent = 'Set Camera';

                if (initialCameraData) {
                    const pos = initialCameraData.position;
                    camera.position.x = pos.x;
                    camera.position.y = pos.y;
                    camera.position.z = pos.z;

                    if (initialCameraData.fx) {
                        camera.data.fx = initialCameraData.fx;
                        camera.data.fy = initialCameraData.fy;
                        focalInput.value = Math.round(initialCameraData.fx);
                        focalNumber.value = Math.round(initialCameraData.fx);
                    }
                    fovReference = initialCameraData.fovReference ? { ...initialCameraData.fovReference } : fovReference;
                    resizeRendererToCanvas();

                    if (initialCameraData.target && controls.setCameraTarget) {
                        controls.setCameraTarget(initialCameraData.target);
                    }

                    console.log('[GaussianViewer] Reset camera to position:', pos.x, pos.y, pos.z);
                } else {
                    camera.position.x = 0;
                    camera.position.y = 0;
                    camera.position.z = 5;
                    camera.data.fx = DEFAULT_FOCAL_LENGTH;
                    camera.data.fy = DEFAULT_FOCAL_LENGTH;
                    focalInput.value = DEFAULT_FOCAL_LENGTH;
                    focalNumber.value = DEFAULT_FOCAL_LENGTH;
                    console.log('[GaussianViewer] Reset camera to default position (0, 0, 5)');
                }
                controls.update();
                invalidateRender(1000);
            }
        }

        // Gaussian scale control
        let currentScale = 1.0;
        let scaleThrottleTimeout = null;
        let scaleThrottledValue = 1.0;

        function updateGaussianScale(newScale, source) {
            newScale = Math.max(0.01, Math.min(100, parseFloat(newScale) || 1.0));
            currentScale = newScale;

            // Sync whichever element didn't trigger the update (prevents typing blockages)
            if (source !== 'slider') {
                scaleInput.value = newScale;
            }
            if (source !== 'number') {
                scaleNumber.value = newScale.toFixed(2);
            }

            if (!currentSplat || !currentSplat.data || !currentSplat.data.scales || !currentSplat._originalScales) return;

            // Throttle actual array data updates during active drag
            scaleThrottledValue = newScale;
            if (scaleThrottleTimeout) return;

            scaleThrottleTimeout = setTimeout(() => {
                scaleThrottleTimeout = null;
                applyScaleToData(scaleThrottledValue);
            }, 100); // Caps updates at 10 updates per second during sliding
        }

        function applyScaleToData(targetScale) {
            if (!currentSplat || !currentSplat.data || !currentSplat.data.scales || !currentSplat._originalScales) return;

            console.log('[GaussianViewer] Applying scale change to splat data:', targetScale);

            const scales = currentSplat.data.scales;
            const originalScales = currentSplat._originalScales;

            // Directly calculate scales relative to original data to avoid float drift/degradation
            for (let i = 0; i < scales.length; i++) {
                scales[i] = originalScales[i] * targetScale;
            }

            // Flag the data changed state to trigger asynchronous repacking
            currentSplat.data.changed = true;
            if (currentSplat.raiseChangeEvent) {
                currentSplat.raiseChangeEvent();
            }

            // Force WebGL updates
            const renderData = renderer._renderData || renderer.renderData;
            if (renderData) {
                if (renderData.markDirty) {
                    renderData.markDirty(currentSplat);
                }
                renderData.dataChanged = true;
            }

            if (currentSplat.dispatchEvent && currentSplat._changeEvent) {
                currentSplat.dispatchEvent(currentSplat._changeEvent);
            }

            invalidateRender(1200);
        }

        // Camera focal control
        function updateCameraFocal(newFocal, source) {
            newFocal = Math.max(10, Math.min(10000, parseFloat(newFocal) || DEFAULT_FOCAL_LENGTH));
            
            camera.data.fx = newFocal;
            camera.data.fy = newFocal;
            
            // Sync whichever element didn't trigger the update (prevents typing blockages)
            if (source !== 'slider') {
                focalInput.value = newFocal;
            }
            if (source !== 'number') {
                focalNumber.value = Math.round(newFocal);
            }

            // Ensure window resizing uses the manually updated focal baseline 
            if (fovReference) {
                fovReference.fx = newFocal;
                fovReference.fy = newFocal;
                fovReference.height = canvas.clientHeight || 512;
                fovReference.width = canvas.clientWidth || 512;
            } else {
                rememberCurrentFov(canvas.clientWidth || 512, canvas.clientHeight || 512);
            }

            invalidateRender(500);
        }

        // --- PRESET SYSTEM ENGINE ---
        function getPresets() {
            try {
                return JSON.parse(localStorage.getItem('gsplat_viewer_presets')) || [];
            } catch (e) {
                return [];
            }
        }

        function savePresets(presets) {
            localStorage.setItem('gsplat_viewer_presets', JSON.stringify(presets));
        }

        function populatePresetsDropdown() {
            const presets = getPresets();
            const originalSelection = presetSelect.value;
            
            presetSelect.innerHTML = '<option value="">(No Preset)</option>';
            
            presets.forEach(preset => {
                const opt = document.createElement('option');
                opt.value = preset.name;
                opt.textContent = preset.name;
                presetSelect.appendChild(opt);
            });

            // Reselect the active element if still present in the updated collection
            if (originalSelection) {
                const stillExists = presets.some(p => p.name === originalSelection);
                if (stillExists) {
                    presetSelect.value = originalSelection;
                }
            }
        }

        // --- PRESET ACTIONS ---
        // Save/Override Preset
        document.getElementById('presetSave').addEventListener('click', () => {
            const nameInputVal = presetName.value.trim();
            const selectedPresetName = presetSelect.value;
            
            if (!nameInputVal && !selectedPresetName) {
                alert("Please enter a preset name or select a preset to save.");
                return;
            }
            
            const scale = parseFloat(scaleNumber.value) || 1.0;
            const focal = parseFloat(focalNumber.value) || DEFAULT_FOCAL_LENGTH;
            const ratio = ratioDropdown.value;
            
            let presets = getPresets();
            let finalName = nameInputVal || selectedPresetName;

            // Serialize and track active camera state
            let currentTarget = null;
            const possibleTarget = getControlsTarget();
            if (possibleTarget) {
                currentTarget = { x: possibleTarget.x, y: possibleTarget.y, z: possibleTarget.z };
            } else {
                const pivotDistance = Math.min(0.05, Math.max(0.005, getSceneMaxDim() * 0.002));
                const forward = getCameraForward();
                currentTarget = {
                    x: camera.position.x + forward.x * pivotDistance,
                    y: camera.position.y + forward.y * pivotDistance,
                    z: camera.position.z + forward.z * pivotDistance
                };
            }

            const cameraState = {
                position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                rotation: { x: camera.rotation.x, y: camera.rotation.y, z: camera.rotation.z, w: camera.rotation.w },
                target: currentTarget
            };

            // If a preset is currently active, we prioritize overriding that specific instance
            if (selectedPresetName) {
                const selectedIndex = presets.findIndex(p => p.name === selectedPresetName);
                
                if (selectedIndex >= 0) {
                    // Update and save over the currently selected preset parameters
                    presets[selectedIndex] = {
                        name: finalName,
                        scale,
                        focal,
                        ratio,
                        camera: cameraState
                    };
                    
                    savePresets(presets);
                    populatePresetsDropdown();
                    presetSelect.value = finalName;
                    presetName.value = finalName;
                    return;
                }
            }
            
            // Otherwise, look up by name match or append as a new preset
            const existingIndex = presets.findIndex(p => p.name === finalName);
            
            const newPreset = {
                name: finalName,
                scale,
                focal,
                ratio,
                camera: cameraState
            };
            
            if (existingIndex >= 0) {
                presets[existingIndex] = newPreset;
            } else {
                presets.push(newPreset);
            }
            
            savePresets(presets);
            populatePresetsDropdown();
            presetSelect.value = finalName;
            presetName.value = finalName;
        });

        // Apply Preset (Loads saved data and overrides settings manually)
        function applySelectedPreset() {
            const selectedName = presetSelect.value;
            if (!selectedName) return;
            
            const presets = getPresets();
            const preset = presets.find(p => p.name === selectedName);
            
            if (preset) {
                presetName.value = preset.name;

                // Apply parameters instantly, canceling any pending drag throttling
                updateGaussianScale(preset.scale);
                if (scaleThrottleTimeout) {
                    clearTimeout(scaleThrottleTimeout);
                    scaleThrottleTimeout = null;
                }
                applyScaleToData(preset.scale);
                
                updateCameraFocal(preset.focal);
                
                ratioDropdown.value = preset.ratio;
                resizeRendererToCanvas();

                // Apply saved camera coordinate structures if active and permitted
                const restoreCam = document.getElementById('presetCameraRestore').checked;
                if (restoreCam && preset.camera) {
                    const camPos = preset.camera.position;
                    const targetPos = preset.camera.target ? 
                        new SPLAT.Vector3(preset.camera.target.x, preset.camera.target.y, preset.camera.target.z) : 
                        null;

                    if (camPos && targetPos) {
                        setOrbitControlsFromSaved(camPos, targetPos);
                    }
                }

                invalidateRender(1200);
            }
        }

        // Delete Preset
        document.getElementById('presetDelete').addEventListener('click', () => {
            const selectedName = presetSelect.value;
            if (!selectedName) {
                alert("Please select a preset to delete.");
                return;
            }
            
            let presets = getPresets();
            presets = presets.filter(p => p.name !== selectedName);
            
            savePresets(presets);
            populatePresetsDropdown();
            presetSelect.value = "";
            presetName.value = "";
        });

        // Populate fields and auto-apply when a preset is selected from dropdown
        presetSelect.addEventListener('change', () => {
            if (!presetSelect.value) {
                presetName.value = "";
                return;
            }
            applySelectedPreset();
        });

        // Info popup handlers
        infoBtn.addEventListener('click', () => {
            infoModal.style.display = 'flex';
        });

        closeModal.addEventListener('click', () => {
            infoModal.style.display = 'none';
        });

        infoModal.addEventListener('click', (e) => {
            if (e.target === infoModal) {
                infoModal.style.display = 'none';
            }
        });

        // Handle scale slider dragging
        scaleInput.addEventListener('input', (e) => {
            updateGaussianScale(e.target.value, 'slider');
        });

        // Handle scale slider release
        scaleInput.addEventListener('change', (e) => {
            if (scaleThrottleTimeout) {
                clearTimeout(scaleThrottleTimeout);
                scaleThrottleTimeout = null;
            }
            applyScaleToData(parseFloat(e.target.value));
        });

        // Handle manual scale input typing
        scaleNumber.addEventListener('input', (e) => {
            updateGaussianScale(e.target.value, 'number');
        });

        // Ensure final scale precision on field blur (leaving the input field)
        scaleNumber.addEventListener('blur', () => {
            const parsedVal = Math.max(0.01, Math.min(100, parseFloat(scaleNumber.value) || 1.0));
            scaleNumber.value = parsedVal.toFixed(2);
            if (scaleThrottleTimeout) {
                clearTimeout(scaleThrottleTimeout);
                scaleThrottleTimeout = null;
            }
            applyScaleToData(parsedVal);
        });

        // Handle focal slider dragging
        focalInput.addEventListener('input', (e) => {
            updateCameraFocal(e.target.value, 'slider');
        });

        // Handle manual focal input typing
        focalNumber.addEventListener('input', (e) => {
            updateCameraFocal(e.target.value, 'number');
        });

        // Clean formatting on focal field blur
        focalNumber.addEventListener('blur', () => {
            const parsedVal = Math.max(10, Math.min(10000, Math.round(focalNumber.value) || DEFAULT_FOCAL_LENGTH));
            focalNumber.value = parsedVal;
            updateCameraFocal(parsedVal);
        });

        // Handle drop-down ratio modifications
        ratioDropdown.addEventListener('change', () => {
            resizeRendererToCanvas();
            invalidateRender(800);
        });

        // Listen for pointer down triggers (starts drag orbit/pan)
        canvas.addEventListener('pointerdown', () => {
            invalidateRender(900);
            if (isCameraLocked) {
                isCameraLocked = false;
                lockedCameraState = null;
                setCameraBtn.style.background = '#2563eb'; // Revert back to default blue
                setCameraBtn.textContent = 'Set Camera';
                
                // Update parent to reflect cleared lock
                window.parent.postMessage({ type: 'SET_CAMERA', camera: null }, '*');
            }
        });

        // Listen for mouse moves over canvas. Only breaks lock if active mouse dragging (buttons > 0)
        canvas.addEventListener('pointermove', (e) => {
            invalidateRender(900);
            if (isCameraLocked && e.buttons > 0) {
                isCameraLocked = false;
                lockedCameraState = null;
                setCameraBtn.style.background = '#2563eb';
                setCameraBtn.textContent = 'Set Camera';
                window.parent.postMessage({ type: 'SET_CAMERA', camera: null }, '*');
            }
        }, { passive: true });

        // Scroll wheel zooming releases the lock
        canvas.addEventListener('wheel', () => {
            invalidateRender(900);
            if (isCameraLocked) {
                isCameraLocked = false;
                lockedCameraState = null;
                setCameraBtn.style.background = '#2563eb';
                setCameraBtn.textContent = 'Set Camera';
                window.parent.postMessage({ type: 'SET_CAMERA', camera: null }, '*');
            }
        }, { passive: true });

        // Touch orbiting releases the lock
        canvas.addEventListener('touchmove', () => {
            invalidateRender(900);
            if (isCameraLocked) {
                isCameraLocked = false;
                lockedCameraState = null;
                setCameraBtn.style.background = '#2563eb';
                setCameraBtn.textContent = 'Set Camera';
                window.parent.postMessage({ type: 'SET_CAMERA', camera: null }, '*');
            }
        }, { passive: true });

        // Key interactions release the lock if actively shifting view (WASD, Arrow keys, QEZCRF)
        window.addEventListener('keydown', (e) => {
            invalidateRender(900);
            const activeKeys = new Set([
                'KeyW', 'KeyA', 'KeyS', 'KeyD', 
                'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
                'KeyQ', 'KeyE', 'KeyZ', 'KeyC', 'KeyR', 'KeyF'
            ]);
            if (isCameraLocked && activeKeys.has(e.code)) {
                isCameraLocked = false;
                lockedCameraState = null;
                setCameraBtn.style.background = '#2563eb';
                setCameraBtn.textContent = 'Set Camera';
                window.parent.postMessage({ type: 'SET_CAMERA', camera: null }, '*');
            }
        }, { passive: true });

        // Event listeners
        document.getElementById('resetCamera').addEventListener('click', resetCamera);

		// Set Camera button logic (Dispatches payload containing current camera state)
        setCameraBtn.addEventListener('click', () => {
            if (!camera) return;

            // If already locked, clicking the button again toggles the lock off
            if (isCameraLocked) {
                isCameraLocked = false;
                lockedCameraState = null;

                // Clear ComfyUI node parameters
                window.parent.postMessage({
                    type: 'SET_CAMERA',
                    camera: null
                }, '*');

                setCameraBtn.style.background = '#2563eb';
                setCameraBtn.textContent = 'Set Camera';
                return;
            }

            let targetX = 0, targetY = 0, targetZ = 0;
            const targetObj = getControlsTarget();
            if (targetObj) {
                targetX = targetObj.x;
                targetY = targetObj.y;
                targetZ = targetObj.z;
            }

            // Lock camera tracking parameters
            isCameraLocked = true;
            lockedCameraState = {
                position: new SPLAT.Vector3(camera.position.x, camera.position.y, camera.position.z),
                target: new SPLAT.Vector3(targetX, targetY, targetZ),
                focal: camera.data.fx || DEFAULT_FOCAL_LENGTH,
                ratio: ratioDropdown.value
            };

            // Force visual frame render before capture
            if (renderer) {
                renderer.render(scene, camera);
            }

            let base64data;
            const selectedRatio = ratioDropdown.value;

            // If we are using the full canvas or resolution is locked, capture without cropping
            if (selectedRatio === 'canvas' || isResolutionLocked) {
                base64data = canvas.toDataURL("image/png");
            } else {
                // Calculate crop region matching the focus area inside the ratio overlay
                const containerWidth = Math.max(1, viewerContainer.clientWidth);
                const containerHeight = Math.max(1, viewerContainer.clientHeight);
                const targetRatio = getRatioValue(selectedRatio);

                if (targetRatio) {
                    let boxWidth = containerWidth;
                    let boxHeight = containerHeight;

                    if (containerWidth / containerHeight > targetRatio) {
                        boxHeight = containerHeight;
                        boxWidth = containerHeight * targetRatio;
                    } else {
                        boxWidth = containerWidth;
                        boxHeight = containerWidth / targetRatio;
                    }

                    // Convert CSS guide dimensions to canvas backing-store pixel coordinates
                    const scaleX = canvas.width / Math.max(1, canvas.clientWidth);
                    const scaleY = canvas.height / Math.max(1, canvas.clientHeight);

                    const cropWidth = Math.round(boxWidth * scaleX);
                    const cropHeight = Math.round(boxHeight * scaleY);
                    const cropX = Math.round(((containerWidth - boxWidth) / 2) * scaleX);
                    const cropY = Math.round(((containerHeight - boxHeight) / 2) * scaleY);

                    try {
                        // Render cropped segment onto an offscreen 2D canvas
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = cropWidth;
                        tempCanvas.height = cropHeight;
                        const tempCtx = tempCanvas.getContext('2d');
                        
                        tempCtx.drawImage(
                            canvas,
                            cropX, cropY, cropWidth, cropHeight, // Source region
                            0, 0, cropWidth, cropHeight          // Destination region
                        );
                        base64data = tempCanvas.toDataURL("image/png");
                    } catch (e) {
                        console.error("[GaussianViewer] Failed to crop canvas:", e);
                        // Fallback to standard full capture if drawing fails
                        base64data = canvas.toDataURL("image/png");
                    }
                } else {
                    base64data = canvas.toDataURL("image/png");
                }
            }

            const payload = {
                type: 'SET_CAMERA',
                camera: {
                    position: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                    rotation: { x: camera.rotation.x, y: camera.rotation.y, z: camera.rotation.z, w: camera.rotation.w },
                    target: { x: targetX, y: targetY, z: targetZ },
                    focal: camera.data.fx || DEFAULT_FOCAL_LENGTH,
                    scale: parseFloat(scaleNumber.value) || 1.0,
                    aspect_ratio: ratioDropdown.value,
                    timestamp: Date.now()
                },
                image_data: base64data
            };

            // Post properties upwards to the ComfyUI wrapper window
            window.parent.postMessage(payload, '*');

            // Apply permanent green "Camera Locked" styling
            setCameraBtn.style.background = '#15803d';
            setCameraBtn.textContent = 'Camera Locked';
        });

        // Listen for messages from parent
        window.addEventListener('message', (event) => {
            console.log('[GaussianViewer] 📨 Received message from parent:', event.data.type);
            const { type, data, filename, format, extrinsics, intrinsics, coordinateBasis, camera_parameters } = event.data;

            if (type === 'LOAD_MESH_DATA' && data) {
                console.log('[GaussianViewer] 📦 Processing LOAD_MESH_DATA. Size:', (data.byteLength / (1024 * 1024)).toFixed(2), 'MB');
                loadSplatFromData(data, filename || 'gaussian.ply', format || 'ply', extrinsics, intrinsics, coordinateBasis, camera_parameters);
            } else {
                console.warn('[GaussianViewer] ⚠️ Unknown message type or missing data:', type);
            }
        });

        // Initialize on load
        initViewer();

        console.log('[GaussianViewer] Ready - waiting for LOAD_MESH message');
    </script>
</body>

</html>
